services:
  bot:
    image: ${BOT_IMAGE:-ghcr.io/olisikh/telegram-car-index-bot:latest}
    pull_policy: ${BOT_PULL_POLICY:-always}
    env_file:
      - .env
    environment:
      DATABASE_PATH: /app/data/index.db
      PLATE_DETECTOR_PYTHON: /opt/venv/bin/python
      PLATE_DETECTOR_SCRIPT: /app/scripts/detect_and_read_plates.py
      PLATE_DETECTOR_MODEL: /app/models/license-plate-detector.pt
      COLLECTION_DIR: /app/collection
    volumes:
      - car-index-data:/app/data
      - ${HOST_COLLECTION_DIR:-./collection}:/app/collection
    restart: unless-stopped

volumes:
  car-index-data:
